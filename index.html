<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Downsell Offer LATAM</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell" aria-label="Oferta downsell LATAM">
      <section class="offer-frame" aria-label="Pagina da oferta">
        <img
          class="offer-art"
          src="assets/downsells-offer-latam.svg"
          width="941"
          height="1672"
          alt="Oferta downsell LATAM com chamada principal, beneficios, prova visual e botoes de chamada para acao."
        >

        <div
          id="hotmart-sales-funnel"
          class="hotmart-cta"
          aria-label="Botoes de compra Hotmart"
        ></div>
      </section>
    </main>

    <script src="https://checkout.hotmart.com/lib/hotmart-checkout-elements.js"></script>
    <script>
      checkoutElements.init('salesFunnel').mount('#hotmart-sales-funnel')
    </script>
  </body>
</html>
